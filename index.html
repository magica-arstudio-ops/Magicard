<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: sans-serif; }
      #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
      
      /* Watermark CSS */
      #watermark { position: absolute; top: 25px; width: 100%; text-align: center; color: rgba(255, 255, 255, 0.85); font-size: 14px; font-weight: bold; letter-spacing: 1px; text-shadow: 0px 2px 4px rgba(0,0,0,0.8); pointer-events: none; display: flex; flex-direction: column; gap: 4px; }
      #watermark span { font-size: 12px; font-weight: normal; color: #f1c40f; /* Slight gold tint for the @ handle */ }

      .glass-panel { background: rgba(0, 0, 0, 0.7); color: white; padding: 15px 25px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); margin-bottom: auto; margin-top: 80px; }
      
      #start-btn { pointer-events: auto; background: white; color: black; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,255,255,0.3); display: none; position: absolute; top: 50%; transform: translateY(-50%); }
      
      #mute-btn { position: absolute; bottom: 30px; right: 20px; pointer-events: auto; background: rgba(0, 0, 0, 0.7); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 25px; font-size: 16px; cursor: pointer; backdrop-filter: blur(5px); display: none; transition: 0.3s; }
    </style>
  </head>
  <body>
    <div id="ui-layer">
        <div id="watermark">
            GET YOUR MAGIC CARD TODAY
            <span>@MAGICARD on instagram</span>
        </div>

        <div id="status-text" class="glass-panel" style="display: none;">Loading Magic...</div>
        <button id="start-btn">Tap to Start</button>
        <button id="mute-btn">🔇 Tap for Sound</button>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const cardId = urlParams.get('card');
      
      const R2_URL = "https://pub-2b81e1b686a242ef86118f97407886eb.r2.dev";

            const cardData = {
        "juda-2026": { mind: R2_URL + "/test.mind", video: R2_URL + "/test.mp4" },
        "satwik": { 
            mind: R2_URL + "/satwik.mind", 
            video: R2_URL + "/satwik.mp4",
            rotation: "-135 0 180",  
            scale: "3 3 1",       
            position: "0 0 1.5"   
        },
        "ninja": { 
            mind: R2_URL + "/ninja.mind", 
            video: R2_URL + "/ninja.mp4",
            rotation: "-125 0 180",  
            scale: "2 2 1",       
            position: "0 0 1.5"   
        },
        "megha": { 
            mind: R2_URL + "/megha.mind", 
            video: R2_URL + "/megha.mp4",
            rotation: "-125 0 180",  
            scale: "2 2 1",       
            position: "0 0 1.5"   
        },
        "harshavarsha": {
            mind: R2_URL + "/harshavarsha.mind", 
            video: R2_URL + "/harshavarsha.mp4",
            rotation: "-155 0 180",  
            scale: "3 3 1",       
            position: "0 0 1.5"   
        } 
      };

      const startBtn = document.getElementById('start-btn');
      const statusText = document.getElementById('status-text');
      const muteBtn = document.getElementById('mute-btn');

      if (cardId && cardData[cardId]) {
        const data = cardData[cardId];
        
        const vidRotation = data.rotation || "0 0 0";
        const vidScale = data.scale || "-1 1 1"; // Fixed: Default scale is now negative X
        const vidPosition = data.position || "0 0 0";
        
        // Fixed: Added filterMinCF and filterBeta for stabilization
        const sceneHTML = `
          <a-scene mindar-image="imageTargetSrc: ${data.mind}; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no; uiError: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
            <a-assets>
              <video id="ar-video" src="${data.video}" preload="auto" crossorigin="anonymous" playsinline webkit-playsinline loop muted></video>
            </a-assets>
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
            <a-entity id="target" mindar-image-target="targetIndex: 0">
              <a-video src="#ar-video" width="1" height="1" position="${vidPosition}" rotation="${vidRotation}" scale="${vidScale}"></a-video>
            </a-entity>
          </a-scene>
        `;
        
        document.body.insertAdjacentHTML('beforeend', sceneHTML);
        startBtn.style.display = 'block';

        const arVideo = document.querySelector('#ar-video');
        const targetEntity = document.querySelector('#target');

        startBtn.addEventListener('click', () => {
          arVideo.load();
          startBtn.style.display = 'none';
          statusText.style.display = 'block';
          statusText.innerHTML = "Point at the Picture";
          muteBtn.style.display = 'block';
        });
        
        // Sound Button Logic
        muteBtn.addEventListener('click', () => {
            if (arVideo.muted) {
                arVideo.muted = false;
                muteBtn.innerHTML = "🔊 Sound Is On!";
                muteBtn.style.background = "rgba(46, 204, 113, 0.8)";
            } else {
                arVideo.muted = true;
                muteBtn.innerHTML = "🔇 Tap for Sound";
                muteBtn.style.background = "rgba(0, 0, 0, 0.7)";
            }
        });

        targetEntity.addEventListener("targetFound", () => {
           arVideo.play();
           statusText.innerHTML = "Magic Activated!";
           statusText.style.background = "rgba(46, 204, 113, 0.8)";
        });

        targetEntity.addEventListener("targetLost", () => {
           arVideo.pause();
           statusText.innerHTML = "Point at the Picture";
           statusText.style.background = "rgba(0, 0, 0, 0.7)";
        });

      } else {
        statusText.style.display = 'block';
        statusText.innerHTML = "Invalid Magic Link.";
      }
    </script>
  </body>
</html>
